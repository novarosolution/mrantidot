# Render Blueprint — API only. Tuned for free tier (2GB RAM, ~27MB runtime).
services:
  - type: web
    name: mrantidot-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: bash render-build.sh
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: MONGO_MAX_POOL_SIZE
        value: '5'
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        value: '*'
      - key: ENSURE_ADMIN_ON_STARTUP
        value: 'true'
